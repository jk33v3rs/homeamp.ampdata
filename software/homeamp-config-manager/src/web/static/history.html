<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change History - ArchiveSMP Config Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 50%, #006b8f 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #2d3748;
            font-size: 1.1em;
        }

        .nav-links {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-links a {
            background: #e2e8f0;
            color: #2d3748;
            padding: 8px 15px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }

        .nav-links a:hover {
            background: #00d4ff;
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            border-left: 5px solid #00d4ff;
        }

        .stat-card h3 {
            color: #718096;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #00d4ff;
        }

        .filters {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        .filter-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .filter-group label {
            display: block;
            color: #4a5568;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .filter-group input,
        .filter-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1em;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: #00d4ff;
        }

        button {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .history-table {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        tr:hover {
            background: rgba(0, 212, 255, 0.05);
        }

        .change-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .change-type.create { background: #c6f6d5; color: #22543d; }
        .change-type.update { background: #bee3f8; color: #2c5282; }
        .change-type.delete { background: #fed7d7; color: #742a2a; }
        .change-type.deploy { background: #feebc8; color: #7c2d12; }

        .loading {
            text-align: center;
            padding: 40px;
            color: #00d4ff;
            font-size: 1.2em;
        }

        .error {
            background: #fed7d7;
            color: #742a2a;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .pagination button {
            padding: 8px 15px;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📜 Change History</h1>
            <p class="subtitle">Complete audit trail of all configuration changes</p>
            <div class="nav-links">
                <a href="/">🏠 Dashboard</a>
                <a href="/variance">📊 Variance</a>
                <a href="/deploy">🚀 Deploy</a>
                <a href="/migrations">🔄 Migrations</a>
            </div>
        </header>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <h3>Total Changes</h3>
                <div class="stat-value" id="totalChanges">--</div>
            </div>
            <div class="stat-card">
                <h3>Last 7 Days</h3>
                <div class="stat-value" id="recentChanges">--</div>
            </div>
            <div class="stat-card">
                <h3>Active Users</h3>
                <div class="stat-value" id="activeUsers">--</div>
            </div>
            <div class="stat-card">
                <h3>Change Types</h3>
                <div class="stat-value" id="changeTypes">--</div>
            </div>
        </div>

        <div class="filters">
            <h2 style="color: #2d3748; margin-bottom: 15px;">🔍 Filter Changes</h2>
            <div class="filter-group">
                <div>
                    <label>Instance ID</label>
                    <input type="text" id="filterInstance" placeholder="e.g., BENT01">
                </div>
                <div>
                    <label>Plugin Name</label>
                    <input type="text" id="filterPlugin" placeholder="e.g., LevelledMobs">
                </div>
                <div>
                    <label>Changed By</label>
                    <input type="text" id="filterUser" placeholder="e.g., admin">
                </div>
                <div>
                    <label>Change Type</label>
                    <select id="filterType">
                        <option value="">All Types</option>
                        <option value="create">Create</option>
                        <option value="update">Update</option>
                        <option value="delete">Delete</option>
                        <option value="deploy">Deploy</option>
                    </select>
                </div>
            </div>
            <button onclick="loadHistory()">🔍 Apply Filters</button>
            <button onclick="clearFilters()" style="background: #718096; margin-left: 10px;">Clear</button>
        </div>

        <div class="history-table">
            <h2 style="color: #2d3748; margin-bottom: 15px;">📋 Change Log</h2>
            <div id="tableContent">
                <div class="loading">Loading change history...</div>
            </div>
            <div class="pagination" id="pagination" style="display: none;">
                <button onclick="previousPage()" id="prevBtn">← Previous</button>
                <span style="padding: 8px 15px; color: #2d3748; font-weight: 600;" id="pageInfo">Page 1</span>
                <button onclick="nextPage()" id="nextBtn">Next →</button>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 0;
        const pageSize = 50;

        async function loadStats() {
            try {
                const res = await fetch('/api/stats/changes');
                const data = await res.json();
                
                document.getElementById('totalChanges').textContent = data.total_changes || 0;
                
                const last7Days = data.last_7_days?.reduce((sum, day) => sum + day.count, 0) || 0;
                document.getElementById('recentChanges').textContent = last7Days;
                
                document.getElementById('activeUsers').textContent = data.by_user?.length || 0;
                document.getElementById('changeTypes').textContent = data.by_type?.length || 0;
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        async function loadHistory() {
            const instance = document.getElementById('filterInstance').value;
            const plugin = document.getElementById('filterPlugin').value;
            const user = document.getElementById('filterUser').value;
            const type = document.getElementById('filterType').value;
            
            const params = new URLSearchParams();
            if (instance) params.append('instance_id', instance);
            if (plugin) params.append('plugin_name', plugin);
            if (user) params.append('changed_by', user);
            if (type) params.append('change_type', type);
            params.append('limit', pageSize);
            params.append('offset', currentPage * pageSize);
            
            document.getElementById('tableContent').innerHTML = '<div class="loading">Loading...</div>';
            
            try {
                const res = await fetch(`/api/history/changes?${params}`);
                const data = await res.json();
                
                if (data.changes && data.changes.length > 0) {
                    renderTable(data.changes);
                    updatePagination(data.changes.length);
                } else {
                    document.getElementById('tableContent').innerHTML = '<p style="text-align: center; color: #718096; padding: 40px;">No changes found</p>';
                }
            } catch (error) {
                document.getElementById('tableContent').innerHTML = `<div class="error">Error loading history: ${error.message}</div>`;
            }
        }

        function renderTable(changes) {
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Type</th>
                            <th>Instance</th>
                            <th>Plugin</th>
                            <th>Config Key</th>
                            <th>Old Value</th>
                            <th>New Value</th>
                            <th>Changed By</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            changes.forEach(change => {
                const time = new Date(change.changed_at).toLocaleString();
                const oldVal = change.old_value ? (change.old_value.length > 50 ? change.old_value.substring(0, 50) + '...' : change.old_value) : '-';
                const newVal = change.new_value ? (change.new_value.length > 50 ? change.new_value.substring(0, 50) + '...' : change.new_value) : '-';
                
                html += `
                    <tr>
                        <td style="white-space: nowrap;">${time}</td>
                        <td><span class="change-type ${change.change_type}">${change.change_type}</span></td>
                        <td>${change.instance_id || '-'}</td>
                        <td>${change.plugin_name || '-'}</td>
                        <td style="font-family: monospace; font-size: 0.9em;">${change.config_key || '-'}</td>
                        <td style="font-family: monospace; font-size: 0.85em; max-width: 200px; overflow: hidden;">${oldVal}</td>
                        <td style="font-family: monospace; font-size: 0.85em; max-width: 200px; overflow: hidden;">${newVal}</td>
                        <td>${change.changed_by || 'system'}</td>
                    </tr>
                `;
            });
            
            html += `
                    </tbody>
                </table>
            `;
            
            document.getElementById('tableContent').innerHTML = html;
        }

        function updatePagination(count) {
            const pagination = document.getElementById('pagination');
            pagination.style.display = 'flex';
            
            document.getElementById('prevBtn').disabled = currentPage === 0;
            document.getElementById('nextBtn').disabled = count < pageSize;
            document.getElementById('pageInfo').textContent = `Page ${currentPage + 1}`;
        }

        function previousPage() {
            if (currentPage > 0) {
                currentPage--;
                loadHistory();
            }
        }

        function nextPage() {
            currentPage++;
            loadHistory();
        }

        function clearFilters() {
            document.getElementById('filterInstance').value = '';
            document.getElementById('filterPlugin').value = '';
            document.getElementById('filterUser').value = '';
            document.getElementById('filterType').value = '';
            currentPage = 0;
            loadHistory();
        }

        // Load on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadStats();
            loadHistory();
        });
    </script>
</body>
</html>
