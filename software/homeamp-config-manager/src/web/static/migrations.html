<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plugin Migrations - ArchiveSMP Config Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 50%, #006b8f 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #2d3748;
            font-size: 1.1em;
        }

        .nav-links {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-links a {
            background: #e2e8f0;
            color: #2d3748;
            padding: 8px 15px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }

        .nav-links a:hover {
            background: #00d4ff;
            color: white;
        }

        .plugin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .plugin-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 5px solid #00d4ff;
        }

        .plugin-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3);
        }

        .plugin-card.has-breaking {
            border-left-color: #f56565;
        }

        .plugin-name {
            font-size: 1.5em;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 10px;
        }

        .plugin-stats {
            display: flex;
            gap: 15px;
            color: #718096;
            font-size: 0.9em;
        }

        .migration-count {
            color: #00d4ff;
            font-weight: 700;
        }

        .breaking-count {
            color: #f56565;
            font-weight: 700;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 30px;
            max-width: 900px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 3px solid #00d4ff;
        }

        .modal-title {
            font-size: 2em;
            color: #2d3748;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2em;
            color: #718096;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            color: #f56565;
        }

        .migration-item {
            background: #f7fafc;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #00d4ff;
        }

        .migration-item.breaking {
            border-left-color: #f56565;
            background: #fff5f5;
        }

        .migration-path {
            font-family: 'Courier New', monospace;
            background: #2d3748;
            color: #00d4ff;
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
            font-size: 0.9em;
        }

        .migration-path .arrow {
            color: #a0aec0;
            margin: 0 10px;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 600;
            margin-right: 8px;
        }

        .badge.breaking {
            background: #fed7d7;
            color: #742a2a;
        }

        .badge.automatic {
            background: #c6f6d5;
            color: #22543d;
        }

        .badge.manual {
            background: #feebc8;
            color: #7c2d12;
        }

        .badge.rename {
            background: #bee3f8;
            color: #2c5282;
        }

        .badge.move {
            background: #e9d8fd;
            color: #553c9a;
        }

        .badge.type-change {
            background: #fed7e2;
            color: #97266d;
        }

        .badge.remove {
            background: #fbd38d;
            color: #744210;
        }

        .notes {
            color: #4a5568;
            margin-top: 10px;
            font-size: 0.95em;
            line-height: 1.6;
        }

        .doc-link {
            display: inline-block;
            margin-top: 10px;
            color: #00d4ff;
            text-decoration: none;
            font-weight: 600;
        }

        .doc-link:hover {
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #00d4ff;
            font-size: 1.2em;
        }

        .error {
            background: #fed7d7;
            color: #742a2a;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #718096;
        }

        .empty-state h2 {
            color: #4a5568;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔄 Plugin Migrations</h1>
            <p class="subtitle">Track breaking changes and config key migrations across plugin versions</p>
            <div class="nav-links">
                <a href="/">🏠 Dashboard</a>
                <a href="/variance">📊 Variance</a>
                <a href="/deploy">🚀 Deploy</a>
                <a href="/history">📜 History</a>
            </div>
        </header>

        <div id="pluginGrid" class="plugin-grid">
            <div class="loading">Loading migrations...</div>
        </div>
    </div>

    <!-- Modal for migration details -->
    <div id="migrationModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Plugin Migrations</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody">
                <!-- Migration details will be inserted here -->
            </div>
        </div>
    </div>

    <script>
        async function loadPlugins() {
            try {
                const res = await fetch('/api/migrations');
                const data = await res.json();
                
                if (data.plugins && data.plugins.length > 0) {
                    renderPluginGrid(data.plugins);
                } else {
                    document.getElementById('pluginGrid').innerHTML = `
                        <div class="empty-state">
                            <h2>No Migrations Found</h2>
                            <p>No plugin migrations have been recorded yet.</p>
                        </div>
                    `;
                }
            } catch (error) {
                document.getElementById('pluginGrid').innerHTML = `
                    <div class="error">Error loading migrations: ${error.message}</div>
                `;
            }
        }

        function renderPluginGrid(plugins) {
            let html = '';
            
            plugins.forEach(plugin => {
                const hasBreaking = plugin.breaking_count > 0;
                html += `
                    <div class="plugin-card ${hasBreaking ? 'has-breaking' : ''}" onclick="showMigrations('${plugin.plugin_name}')">
                        <div class="plugin-name">${plugin.plugin_name}</div>
                        <div class="plugin-stats">
                            <span><span class="migration-count">${plugin.migration_count}</span> migration${plugin.migration_count !== 1 ? 's' : ''}</span>
                            ${hasBreaking ? `<span><span class="breaking-count">${plugin.breaking_count}</span> breaking</span>` : ''}
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('pluginGrid').innerHTML = html;
        }

        async function showMigrations(pluginName) {
            document.getElementById('modalTitle').textContent = `${pluginName} Migrations`;
            document.getElementById('modalBody').innerHTML = '<div class="loading">Loading details...</div>';
            document.getElementById('migrationModal').classList.add('active');
            
            try {
                const res = await fetch(`/api/migrations/${pluginName}`);
                const data = await res.json();
                
                if (data.migrations && data.migrations.length > 0) {
                    renderMigrations(data.migrations);
                } else {
                    document.getElementById('modalBody').innerHTML = '<p>No migrations found.</p>';
                }
            } catch (error) {
                document.getElementById('modalBody').innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        function renderMigrations(migrations) {
            let html = '';
            
            migrations.forEach(mig => {
                html += `
                    <div class="migration-item ${mig.is_breaking ? 'breaking' : ''}">
                        <div>
                            ${mig.is_breaking ? '<span class="badge breaking">⚠️ BREAKING</span>' : ''}
                            <span class="badge ${mig.migration_type}">${mig.migration_type.toUpperCase()}</span>
                            ${mig.is_automatic ? '<span class="badge automatic">✅ AUTO</span>' : '<span class="badge manual">⚙️ MANUAL</span>'}
                        </div>
                        
                        <div style="margin: 15px 0;">
                            <strong style="color: #4a5568;">Version:</strong> 
                            <span style="color: #00d4ff; font-weight: 600;">${mig.from_version} → ${mig.to_version}</span>
                        </div>
                        
                        <div class="migration-path">
                            <div>${mig.old_key_path}</div>
                            <div class="arrow">↓</div>
                            <div>${mig.new_key_path}</div>
                        </div>
                        
                        ${mig.value_transform ? `
                            <div style="margin-top: 10px;">
                                <strong style="color: #4a5568;">Transform:</strong>
                                <code style="background: #edf2f7; padding: 4px 8px; border-radius: 4px; font-size: 0.9em;">${mig.value_transform}</code>
                            </div>
                        ` : ''}
                        
                        ${mig.notes ? `<div class="notes">📝 ${mig.notes}</div>` : ''}
                        
                        ${mig.documentation_url ? `<a href="${mig.documentation_url}" target="_blank" class="doc-link">📚 View Documentation →</a>` : ''}
                    </div>
                `;
            });
            
            document.getElementById('modalBody').innerHTML = html;
        }

        function closeModal() {
            document.getElementById('migrationModal').classList.remove('active');
        }

        // Close modal on outside click
        document.getElementById('migrationModal').addEventListener('click', (e) => {
            if (e.target.id === 'migrationModal') {
                closeModal();
            }
        });

        // Load on page load
        window.addEventListener('DOMContentLoaded', loadPlugins);
    </script>
</body>
</html>
