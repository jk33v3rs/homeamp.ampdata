<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Overrides - ArchiveSMP</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .player-search {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        .search-box {
            display: flex;
            gap: 10px;
            align-items: end;
        }

        .search-box input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 1em;
        }

        .btn-search {
            padding: 12px 30px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        .player-info {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            display: none;
        }

        .player-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
        }

        .player-avatar {
            width: 64px;
            height: 64px;
            border-radius: 8px;
            background: #e2e8f0;
        }

        .player-details h2 {
            color: #2d3748;
            margin-bottom: 5px;
        }

        .player-uuid {
            font-family: 'Courier New', monospace;
            color: #718096;
            font-size: 0.9em;
        }

        .overrides-panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            display: none;
        }

        .add-override-form {
            background: #f7fafc;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 2fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-grid label {
            display: block;
            font-size: 0.85em;
            color: #718096;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .form-grid input, .form-grid select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
        }

        .btn-add-override {
            padding: 10px 20px;
            background: #00cc99;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        .override-list {
            margin-top: 20px;
        }

        .override-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #ef4444;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .override-info .key {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 5px;
        }

        .override-info .value {
            font-family: 'Courier New', monospace;
            color: #4a5568;
        }

        .override-info .plugin {
            font-size: 0.85em;
            color: #718096;
        }

        .btn-remove-override {
            padding: 6px 12px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #718096;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>👤 Player Config Overrides</h1>
            <p class="subtitle">Manage per-player configuration overrides</p>
        </header>

        <div class="player-search">
            <h2 style="margin-bottom: 15px;">Search Player</h2>
            <div class="search-box">
                <input type="text" id="player-search-input" placeholder="Enter player name or UUID...">
                <button class="btn-search" onclick="searchPlayer()">🔍 Search</button>
            </div>
        </div>

        <div class="player-info" id="player-info">
            <div class="player-header">
                <img class="player-avatar" id="player-avatar" src="" alt="Player Avatar">
                <div class="player-details">
                    <h2 id="player-name">Player Name</h2>
                    <div class="player-uuid" id="player-uuid">UUID</div>
                </div>
            </div>
        </div>

        <div class="overrides-panel" id="overrides-panel">
            <h2 style="margin-bottom: 20px;">Configuration Overrides</h2>

            <div class="add-override-form">
                <h3 style="margin-bottom: 15px;">Add Override</h3>
                <div class="form-grid">
                    <div>
                        <label>Instance</label>
                        <select id="override-instance">
                            <option value="">Select...</option>
                        </select>
                    </div>
                    <div>
                        <label>Plugin</label>
                        <select id="override-plugin">
                            <option value="">Select...</option>
                        </select>
                    </div>
                    <div>
                        <label>Config Key</label>
                        <input type="text" id="override-key" placeholder="settings.example.key">
                    </div>
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; font-size: 0.85em; color: #718096; margin-bottom: 5px; text-transform: uppercase;">Value</label>
                    <input type="text" id="override-value" placeholder="Override value" style="width: 100%; padding: 10px; border: 2px solid #e2e8f0; border-radius: 6px;">
                </div>
                <button class="btn-add-override" onclick="addPlayerOverride()">+ Add Override</button>
            </div>

            <div class="override-list">
                <h3 style="margin-bottom: 15px;">Active Overrides</h3>
                <div id="override-list-container">
                    <div class="empty-state">
                        <p>No overrides configured for this player</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="player_overrides.js"></script>
</body>
</html>
